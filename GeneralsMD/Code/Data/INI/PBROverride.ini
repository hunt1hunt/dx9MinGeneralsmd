; PBROverride.ini — per-model PBR roughness/metalness overrides
; Format: mesh_prefix = roughness, metalness
; Prefix matching: "AVPaladin" matches "AVPaladin.Body01", "AVPaladin.Turret01"
; Blank lines and lines starting with ; or / are ignored
;
; ============================================================================
; ADJUSTMENT RULES (以战列舰 0.45/0.35 为基准)
; ============================================================================
;   Heavy armor / MBT (坦克涂装装甲): rough=0.40-0.45, metal=0.40-0.45
;     → 降金属度增亮，提粗糙扩散高光
;   Painted / light vehicles (漆面车体): rough=0.50-0.60, metal=0.15-0.25
;     → 微金属感，哑光漆面
;   Non-metal / canvas (非金属/帆布): rough=0.65-0.80, metal=0.00-0.08
;   Aircraft (蒙皮涂装): rough=0.50-0.65, metal=0.05-0.15
;   Naval (涂装钢质舰体): rough=0.45-0.55, metal=0.20-0.35
;
